<div class="admin-login-page">
  <div class="admin-login-card">
    <p class="section-tag">Admin Access</p>
    <h2>PowerLink Admin Login</h2>
    <p>Use the admin credentials to access orders and plumber operations.</p>

    <form [formGroup]="adminForm" (ngSubmit)="submit()">
      <input type="email" placeholder="Admin Email" formControlName="email">
      <div class="error" *ngIf="adminForm.get('email')?.touched && adminForm.get('email')?.invalid">
        Enter a valid admin email.
      </div>

      <input type="password" placeholder="Admin Password" formControlName="password">
      <div class="error" *ngIf="adminForm.get('password')?.touched && adminForm.get('password')?.invalid">
        Password must be at least 6 characters.
      </div>

      <button type="submit" [disabled]="adminForm.invalid">Admin Login</button>
      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>
  </div>
</div>
